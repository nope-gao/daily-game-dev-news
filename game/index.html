<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Game Dev News</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="container">

  <div class="index-header">
    <img src="../assets/images/初音未来-可爱头像.jpg" alt="" class="avatar">
    <h1>每日速递</h1>
    <div class="sub">Daily Game Dev News</div>
    <p class="desc">
      每日精选游戏开发、游戏圈、AI 圈最新动态<br>
      引擎更新 · 产业新闻 · AI 突破，5 分钟跟上步伐
    </p>
    <a href="https://github.com/nope-gao/ai-daily-express" target="_blank" class="gh-link">GitHub 仓库</a>
  </div>

  <div id="latest-banner" class="latest-banner">
    <strong>最新一期：</strong><span id="latest-text"></span>
  </div>

  <div id="archive-grid" class="archive-grid"></div>
  <div id="pagination" class="pagination"></div>

  <div class="footer">
    <img src="../assets/images/大黄蜂-点头.gif" alt="" class="footer-img">
    <div class="footer-logo">Daily Game Dev News</div>
    <p>
      每日精选 · 值得关注 | 由 Hermes Agent 自动化生成<br>
      <a href="https://github.com/nope-gao/ai-daily-express" target="_blank">GitHub 仓库</a>
    </p>
  </div>

</div>

<script>
(function() {
  var ARCHIVE_DATA = [
    {
        "date": "2026-07-21",
        "weekday": "星期二",
        "keywords": "Kimi K3 Steam Machine GPT-5.6 SSAO Moonshine"
    },
    {
        "date": "2026-07-20",
        "weekday": "星期一",
        "keywords": "Qwen 3.8 Kimi K3 Minecraft SDL3 Codex Claude Code"
    },
    {
        "date": "2026-07-19",
        "weekday": "星期日",
        "keywords": "Kimi K3 GPT-5.6 凸优化 静默重编译 Backrooms"
    },
    {
        "date": "2026-07-18",
        "weekday": "星期六",
        "keywords": "Kimi K3 LM Studio Godot Steam Deck Soofi S"
    },
    {
        "date": "2026-07-17",
        "weekday": "星期五",
        "keywords": "Inkling Open-Weights Steam Deck Sony DRM Moonshot AI"
    },
    {
        "date": "2026-07-15",
        "weekday": "星期三",
        "keywords": "Sony数字所有权 GPT-5.6迁移 Codex加密代理 GTA行业隐忧 Mesh LLM"
    },
    {
        "date": "2026-07-14",
        "weekday": "星期二",
        "keywords": "Apple起诉OpenAI Steam H1破110亿美元 Godot-MCP集成 中国AI模型管制 独立游戏引擎"
    },
    {
        "date": "2026-07-11",
        "weekday": "星期六",
        "keywords": "Steam半年报 Flint可视化 id裁员 AI可观测性 开源游戏"
    },
    {
        "date": "2026-07-10",
        "weekday": "星期五",
        "keywords": "GPT-5.6 Grok 4.5 Godot 禁 AI Meta Muse Gemini 3.5"
    },
    {
        "date": "2026-07-09",
        "weekday": "星期四",
        "keywords": "Steam Grok 4.5 GPT-5.6 独立游戏 游戏引擎"
    },
    {
        "date": "2026-07-07",
        "weekday": "星期二",
        "keywords": "Godot AI政策 数字游戏所有权 Meta LLM追平GPT 开源游戏平台 实时版本控制"
    },
    {
        "date": "2026-07-06",
        "weekday": "星期一",
        "keywords": ""
    }
];

  var PAGE_SIZE = 12;
  var currentPage = 0;

  function getWeekday(s) {
    var w = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    return w[new Date(s + 'T00:00:00').getDay()];
  }
  function renderGrid(page) {
    var grid = document.getElementById('archive-grid');
    var pagination = document.getElementById('pagination');
    if (!grid) return;
    var total = ARCHIVE_DATA.length;
    var totalPages = Math.ceil(total / PAGE_SIZE) || 1;
    if (page >= totalPages) page = totalPages - 1;
    if (page < 0) page = 0;
    currentPage = page;
    var start = page * PAGE_SIZE;
    var end = Math.min(start + PAGE_SIZE, total);
    var items = ARCHIVE_DATA.slice(start, end);
    if (items.length === 0) {
      grid.innerHTML = '<p style="text-align:center;padding:40px;color:var(--text-muted);">暂无存档记录</p>';
      pagination.innerHTML = '';
      return;
    }
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var wd = it.weekday || getWeekday(it.date);
      var kw = it.keywords || '';
      html += '<a class="archive-card" href="daily/' + it.date + '.html">' +
        '<div class="card-date">' + it.date.replace(/-/g, '/') + '</div>' +
        '<div class="card-wd">' + wd + '</div>' +
        (kw ? '<div class="card-kw">' + kw + '</div>' : '') +
        '</a>';
    }
    grid.innerHTML = html;
    var ph = '';
    ph += '<button ' + (page === 0 ? 'disabled' : '') + ' onclick="window._goPage(' + (page - 1) + ')">‹ 上一页</button>';
    for (var p = 0; p < totalPages; p++) {
      ph += '<button class="' + (p === page ? 'active' : '') + '" onclick="window._goPage(' + p + ')">' + (p + 1) + '</button>';
    }
    ph += '<button ' + (page >= totalPages - 1 ? 'disabled' : '') + ' onclick="window._goPage(' + (page + 1) + ')">下一页 ›</button>';
    pagination.innerHTML = ph;
  }
  window._goPage = function(page) {
    renderGrid(page);
    window.scrollTo({ top: document.getElementById('archive-grid').offsetTop - 60, behavior: 'smooth' });
  };
  function init() {
    if (ARCHIVE_DATA.length > 0) {
      var latest = ARCHIVE_DATA[0];
      var link = document.getElementById('latest-link');
      if (link) link.href = 'daily/' + latest.date + '.html';
      var txt = document.getElementById('latest-text');
      if (txt) {
        txt.textContent = latest.date + ' (' + (latest.weekday || getWeekday(latest.date)) + ')' +
          (latest.keywords ? ' - ' + latest.keywords : '');
      }
    }
    renderGrid(0);
  }
  init();
})();
</script>
</body>
</html>
