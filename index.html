<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日速递 — Daily Express</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="container">

  <div class="header">
    <img src="assets/images/初音未来-可爱头像.jpg" alt="" class="avatar">
    <h1>每日速递</h1>
    <div class="sub">Daily Express</div>
    <p class="desc">
      三站日报，每日精选。游戏开发、网络安全、生物健康、世界局势，5 分钟跟上步伐。
    </p>
  </div>

  <div class="cards">

    <a class="card card-game" href="game/">
      <img src="assets/images/初音未来-贪吃.avif" alt="" class="card-icon">
      <div class="card-text">
        <div class="name">游戏 & AI & 网安</div>
        <div class="tags">
          <span style="color:#e63946;">引擎更新</span>
          <span style="color:#457b9d;">游戏圈</span>
          <span style="color:#2a9d8f;">AI突破</span>
          <span style="color:#e63946;">网安</span>
        </div>
        <div class="latest" id="latest-game">加载中...</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card card-bio" href="bio/">
      <img src="assets/images/初音未来-可爱.avif" alt="" class="card-icon">
      <div class="card-text">
        <div class="name">生物 & 永生 & 健康</div>
        <div class="tags">
          <span style="color:#2d6a4f;">抗衰老</span>
          <span style="color:#52b788;">基因治疗</span>
          <span style="color:#95d5b2;">生物技术</span>
        </div>
        <div class="latest">即将上线</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

    <a class="card card-world" href="world/">
      <img src="assets/images/初音未来-盯着你.avif" alt="" class="card-icon">
      <div class="card-text">
        <div class="name">世界局势 & 政治 & 经济</div>
        <div class="tags">
          <span style="color:#1b2838;">国际</span>
          <span style="color:#c9a227;">政治</span>
          <span style="color:#2a9d8f;">经济</span>
        </div>
        <div class="latest">即将上线</div>
      </div>
      <div class="card-arrow">→</div>
    </a>

  </div>

  <div class="footer">
    <img src="assets/images/大黄蜂-点头.gif" alt="">
    <p>
      Daily Express · <a href="https://github.com/nope-gao/daily-game-dev-news" target="_blank">GitHub</a>
    </p>
  </div>

</div>

<script>
// Fetch latest issue dates from each station's index page
async function loadLatest() {
  try {
    let r = await fetch('game/');
    let html = await r.text();
    let m = html.match(/ARCHIVE_DATA\s*=\s*\[.*?"date":\s*"([^"]+)"/);
    if (m) document.getElementById('latest-game').textContent = '最新: ' + m[1];
  } catch(e) {}
}
loadLatest();
</script>
</body>
</html>
