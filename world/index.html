<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>世界局势 & 政治 & 经济 — Daily Express</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="container">

  <div class="index-header">
    <img src="../assets/images/初音未来-盯着你.avif" alt="" class="avatar">
    <h1>世界局势 & 政治 & 经济</h1>
    <div class="sub">World · Politics · Economy</div>
    <p class="desc">
      每日精选国际局势、政治动态、经济趋势<br>
      地缘 · 政策 · 市场 · 商业，5 分钟读懂世界
    </p>
    <a href="../index.html" style="display:inline-block;margin-top:14px;font-size:0.75em;color:var(--text-muted);text-decoration:none;">← 返回总站</a>
  </div>

  <div id="latest-banner" class="latest-banner">
    <strong>最新一期：</strong><span id="latest-text">暂无</span>
  </div>

  <div id="archive-grid" class="archive-grid"></div>
  <div id="pagination" class="pagination"></div>

  <div class="footer">
    <img src="../assets/images/大黄蜂-点头.gif" alt="" class="footer-img">
    <div class="footer-logo">World Affairs Daily</div>
    <p>
      每日精选 · 值得关注 | 由 Hermes Agent 自动化生成
    </p>
  </div>

</div>

<script>
(function() {
  var ARCHIVE_DATA = [
    {
        "date": "2026-07-20",
        "weekday": "星期一",
        "keywords": "霍尔木兹海峡 中美博弈 特朗普 IBM暴跌 AI威胁就业"
    },
    {
        "date": "2026-07-19",
        "weekday": "星期日",
        "keywords": "中东战事 美伊冲突 Trump政府 经济冲击 AI影响"
    },
    {
        "date": "2026-07-18",
        "weekday": "星期六",
        "keywords": "霍尔木兹 美伊冲突 特朗普 股市震荡 AI通胀"
    },
    {
        "date": "2026-07-17",
        "weekday": "星期五",
        "keywords": "伊朗冲突 特朗普 中美关系 地缘政治 经济通胀"
    },
    {
        "date": "2026-07-14",
        "weekday": "星期二",
        "keywords": "美伊冲突 无人机 霍尔木兹海峡 特朗普 石油需求"
    },
    {
        "date": "2026-07-12",
        "weekday": "星期日",
        "keywords": "伊朗冲突升级 乌克兰无人机 特朗普贸易战 欧盟Chat Control AI与通胀"
    },
    {
        "date": "2026-07-11",
        "weekday": "星期六",
        "keywords": "美伊战争 贸易制裁 伊朗核威胁 无人机军备 欧洲经济"
    },
    {
        "date": "2026-07-09",
        "weekday": "星期四",
        "keywords": "美伊冲突 NATO峰会 霍尔木兹海峡 油价飙升 科技监管"
    },
    {
        "date": "2026-07-06",
        "weekday": "星期一",
        "keywords": "中美关系 欧盟 美联储 东南亚 AI 监管"
    }
];

  var PAGE_SIZE = 12;
  var currentPage = 0;

  function getWeekday(s) {
    var w = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    return w[new Date(s + 'T00:00:00').getDay()];
  }
  function renderGrid(page) {
    var grid = document.getElementById('archive-grid');
    var pagination = document.getElementById('pagination');
    if (!grid) return;
    var total = ARCHIVE_DATA.length;
    var totalPages = Math.ceil(total / PAGE_SIZE) || 1;
    if (page >= totalPages) page = totalPages - 1;
    if (page < 0) page = 0;
    currentPage = page;
    var start = page * PAGE_SIZE;
    var end = Math.min(start + PAGE_SIZE, total);
    var items = ARCHIVE_DATA.slice(start, end);
    if (items.length === 0) {
      grid.innerHTML = '<p style="text-align:center;padding:60px 40px;color:var(--text-muted);line-height:2;">暂无存档记录<br><span style="font-size:0.85em;">日报将从明日 13:00 开始自动推送</span></p>';
      pagination.innerHTML = '';
      return;
    }
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var wd = it.weekday || getWeekday(it.date);
      var kw = it.keywords || '';
      html += '<a class="archive-card" href="daily/' + it.date + '.html">' +
        '<div class="card-date">' + it.date.replace(/-/g, '/') + '</div>' +
        '<div class="card-wd">' + wd + '</div>' +
        (kw ? '<div class="card-kw">' + kw + '</div>' : '') +
        '</a>';
    }
    grid.innerHTML = html;
    var ph = '';
    ph += '<button ' + (page === 0 ? 'disabled' : '') + ' onclick="window._goPage(' + (page - 1) + ')">‹ 上一页</button>';
    for (var p = 0; p < totalPages; p++) {
      ph += '<button class="' + (p === page ? 'active' : '') + '" onclick="window._goPage(' + p + ')">' + (p + 1) + '</button>';
    }
    ph += '<button ' + (page >= totalPages - 1 ? 'disabled' : '') + ' onclick="window._goPage(' + (page + 1) + ')">下一页 ›</button>';
    pagination.innerHTML = ph;
  }
  window._goPage = function(page) {
    renderGrid(page);
    window.scrollTo({ top: document.getElementById('archive-grid').offsetTop - 60, behavior: 'smooth' });
  };
  function init() {
    if (ARCHIVE_DATA.length > 0) {
      var latest = ARCHIVE_DATA[0];
      var txt = document.getElementById('latest-text');
      if (txt) {
        txt.textContent = latest.date + ' (' + (latest.weekday || getWeekday(latest.date)) + ')' +
          (latest.keywords ? ' - ' + latest.keywords : '');
      }
    }
    renderGrid(0);
  }
  init();
})();
</script>
</body>
</html>
