<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生物 & 永生 & 健康 — Daily Express</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="container">

  <div class="index-header">
    <img src="../assets/images/初音未来-可爱.avif" alt="" class="avatar">
    <h1>生物 & 永生 & 健康</h1>
    <div class="sub">Bio · Longevity · Health</div>
    <p class="desc">
      每日精选抗衰老研究、基因治疗、生物技术、健康科普<br>
      衰老 · 疾病 · 治愈 · 长寿，5 分钟跟上前沿
    </p>
    <a href="../index.html" style="display:inline-block;margin-top:14px;font-size:0.75em;color:var(--text-muted);text-decoration:none;">← 返回总站</a>
  </div>

  <div id="latest-banner" class="latest-banner">
    <strong>最新一期：</strong><span id="latest-text">暂无</span>
  </div>

  <div id="archive-grid" class="archive-grid"></div>
  <div id="pagination" class="pagination"></div>

  <div class="footer">
    <img src="../assets/images/大黄蜂-点头.gif" alt="" class="footer-img">
    <div class="footer-logo">Bio & Health Daily</div>
    <p>
      每日精选 · 值得关注 | 由 Hermes Agent 自动化生成
    </p>
  </div>

</div>

<script>
(function() {
  var ARCHIVE_DATA = [
    {
        "date": "2026-07-15",
        "weekday": "星期三",
        "keywords": "Semaglutide 表观遗传时钟 痴呆症 THC/CBD 脂肪肝 肠道疫苗 运动重塑心脏"
    },
    {
        "date": "2026-07-14",
        "weekday": "星期二",
        "keywords": "前列腺癌 mRNA疫苗 睡眠不足 ZFP384 牙周病菌 硅芯片DNA"
    },
    {
        "date": "2026-07-12",
        "weekday": "星期日",
        "keywords": "长寿大会 间歇禁食 β-葡聚糖 ORFeome 维生素A 心脏-脑轴"
    },
    {
        "date": "2026-07-11",
        "weekday": "星期六",
        "keywords": "青蛙细菌抗癌 长寿饮食 Orforglipron DNA 芯片 mRNA 疫苗 Karyoptosis"
    },
    {
        "date": "2026-07-10",
        "weekday": "星期五",
        "keywords": "Cas-CLEAR CRISPR 新平台 Daraxonrasib EMA 饮食与长寿 CAR-T 上海 GSK Alector"
    },
    {
        "date": "2026-07-09",
        "weekday": "星期四",
        "keywords": "智慧牙再生 胰腺癌突破 CRISPR 新工具 长寿生物标记 癌症疫苗"
    },
    {
        "date": "2026-07-08",
        "weekday": "星期三",
        "keywords": "Senolytics CRISPR 儿童 胰腺癌 干细胞 癌症疫苗"
    },
    {
        "date": "2026-07-07",
        "weekday": "星期二",
        "keywords": "表观遗传 激光治疗 基因治疗 GLP-1 阿尔茨海默"
    },
    {
        "date": "2026-07-06",
        "weekday": "星期一",
        "keywords": "Senolytics CRISPR 抗衰老 再生医学 端粒"
    }
];

  var PAGE_SIZE = 12;
  var currentPage = 0;

  function getWeekday(s) {
    var w = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    return w[new Date(s + 'T00:00:00').getDay()];
  }
  function renderGrid(page) {
    var grid = document.getElementById('archive-grid');
    var pagination = document.getElementById('pagination');
    if (!grid) return;
    var total = ARCHIVE_DATA.length;
    var totalPages = Math.ceil(total / PAGE_SIZE) || 1;
    if (page >= totalPages) page = totalPages - 1;
    if (page < 0) page = 0;
    currentPage = page;
    var start = page * PAGE_SIZE;
    var end = Math.min(start + PAGE_SIZE, total);
    var items = ARCHIVE_DATA.slice(start, end);
    if (items.length === 0) {
      grid.innerHTML = '<p style="text-align:center;padding:60px 40px;color:var(--text-muted);line-height:2;">暂无存档记录<br><span style="font-size:0.85em;">日报将从明日 12:30 开始自动推送</span></p>';
      pagination.innerHTML = '';
      return;
    }
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var wd = it.weekday || getWeekday(it.date);
      var kw = it.keywords || '';
      html += '<a class="archive-card" href="daily/' + it.date + '.html">' +
        '<div class="card-date">' + it.date.replace(/-/g, '/') + '</div>' +
        '<div class="card-wd">' + wd + '</div>' +
        (kw ? '<div class="card-kw">' + kw + '</div>' : '') +
        '</a>';
    }
    grid.innerHTML = html;
    var ph = '';
    ph += '<button ' + (page === 0 ? 'disabled' : '') + ' onclick="window._goPage(' + (page - 1) + ')">‹ 上一页</button>';
    for (var p = 0; p < totalPages; p++) {
      ph += '<button class="' + (p === page ? 'active' : '') + '" onclick="window._goPage(' + p + ')">' + (p + 1) + '</button>';
    }
    ph += '<button ' + (page >= totalPages - 1 ? 'disabled' : '') + ' onclick="window._goPage(' + (page + 1) + ')">下一页 ›</button>';
    pagination.innerHTML = ph;
  }
  window._goPage = function(page) {
    renderGrid(page);
    window.scrollTo({ top: document.getElementById('archive-grid').offsetTop - 60, behavior: 'smooth' });
  };
  function init() {
    if (ARCHIVE_DATA.length > 0) {
      var latest = ARCHIVE_DATA[0];
      var txt = document.getElementById('latest-text');
      if (txt) {
        txt.textContent = latest.date + ' (' + (latest.weekday || getWeekday(latest.date)) + ')' +
          (latest.keywords ? ' - ' + latest.keywords : '');
      }
    }
    renderGrid(0);
  }
  init();
})();
</script>
</body>
</html>
